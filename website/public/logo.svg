<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1B26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0E14;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#grad1)" />
  
  <!-- Outer Circle of Nodes -->
  <g fill="#7AA2F7" opacity="0.6">
    <circle cx="50" cy="15" r="2" />
    <circle cx="67.5" cy="20" r="2" />
    <circle cx="80" cy="32.5" r="2" />
    <circle cx="85" cy="50" r="2" />
    <circle cx="80" cy="67.5" r="2" />
    <circle cx="67.5" cy="80" r="2" />
    <circle cx="50" cy="85" r="2" />
    <circle cx="32.5" cy="80" r="2" />
    <circle cx="20" cy="67.5" r="2" />
    <circle cx="15" cy="50" r="2" />
    <circle cx="20" cy="32.5" r="2" />
    <circle cx="32.5" cy="20" r="2" />
  </g>
  
  <!-- Inner Circle Connections -->
  <g stroke="#00D2FF" stroke-width="0.5" opacity="0.4" fill="none">
    <circle cx="50" cy="50" r="30" />
    <path d="M50 20 L65 35 M80 50 L65 65 M50 80 L35 65 M20 50 L35 35" />
  </g>
  
  <!-- Terminal Prompt -->
  <g filter="url(#glow)">
    <path d="M40 35 L55 50 L40 65" stroke="#00D2FF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="58" y="60" width="12" height="4" fill="#00D2FF" rx="1" />
  </g>
</svg>
